name: generate animation

on:
  # ដំណើរការដោយស្វ័យប្រវត្តិរៀងរាល់ ២៤ ម៉ោងម្ដង
  schedule:
    - cron: "0 */24 * * *" 
  
  # អនុញ្ញាតឱ្យយើងចុច Run ដោយដៃពី tab Actions
  workflow_dispatch:
  
  # ដំណើរការរាល់ពេលដែលមានការ push ទៅកាន់ branch main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write # ចាំបាច់ត្រូវមានសិទ្ធិសរសេរ ដើម្បីដោះស្រាយបញ្ហា exit code 128
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # ជំហានទី ១: ទាញយក repository មកប្រើ (ប្រើ v4)
      - name: checkout
        uses: actions/checkout@v4
      
      # ជំហានទី ២: បង្កើតរូបភាព snake
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      # ជំហានទី ៣: ដាក់រូបភាពចូលក្នុង branch មួយឈ្មោះ output (ប្រើ v4)
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
